# 1. 좌우 분리형(Split) 키보드 활성화 (★필수)
CONFIG_ZMK_SPLIT=y

# ---------------------------------------------------
# 아래는 하드웨어 구성에 따라 필요한 경우에만 주석(#)을 풀고 사용하세요.

# (선택) 2. OLED 디스플레이를 달아둔 경우
# CONFIG_ZMK_DISPLAY=y

# (선택) 3. 로터리 인코더(다이얼)를 달아둔 경우
# CONFIG_EC11=y
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# (선택) 4. 블루투스 연결성 강화 (Ninenano/Nice!Nano에서 자주 씀)
# CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
#CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
# 딥슬립(Deep Sleep) 모드 활성화 (배터리 수명 극대화)
CONFIG_ZMK_SLEEP=y

# (선택) 일반 절전 모드 진입 시간 (밀리초 단위, 기본값 30000 = 30초)
# 아무것도 안 하고 있으면 LED 등을 끄고 대기 모드에 들어가는 시간입니다.
CONFIG_ZMK_IDLE_TIMEOUT=30000

# (선택) 딥슬립 모드 진입 시간 (밀리초 단위, 기본값 900000 = 15분)
# 이 시간이 지나면 컨트롤러가 수면 상태에 빠집니다. (깨어날 때 첫 키 입력은 약간의 딜레이가 있습니다)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000